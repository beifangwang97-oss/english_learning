server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/kineticscholar
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379

# Eureka Client Configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8888/eureka/

# JWT Configuration
jwt:
  secret: kineticscholar_secret_key_123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890
  expiration: 86400
